name: landing_test
description: "Grupo Fercadi - App de Delivery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  go_router: ^14.0.0
  provider: ^6.1.2
  carousel_slider: ^5.0.0
  geolocator: ^13.0.2
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  image_picker: ^1.1.2
  path_provider: ^2.1.0
  path: ^1.9.0
  http: ^1.2.0
  flutter_svg: ^2.0.10
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#E91E8C"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
