# ══════════════════════════════════════════════════════════════
#  NGINX — Proxy inverso de Fercadi
#  Cambia "tudominio.com" por tu dominio real en todo el archivo
# ══════════════════════════════════════════════════════════════

# ── Redirigir HTTP → HTTPS (todo sin SSL va al HTTPS) ─────────
server {
    listen 80;
    server_name tudominio.com www.tudominio.com monitor.tudominio.com;

    # Necesario para que Certbot pueda renovar el certificado SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás: redirigir a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Panel de monitoreo (Uptime Kuma) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name monitor.tudominio.com;

    ssl_certificate /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000";

    location / {
        proxy_pass http://uptime-kuma:3001;
        proxy_http_version 1.1;
        # Necesario para que Uptime Kuma funcione con WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

